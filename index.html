<!DOCTYPE html>
/* kaka */
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weird Stuff</title>
<link rel="icon" href="./icon.jpg" type="image/jpg>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#05070a;
  color:#e5e7eb;
  font-family:'Share Tech Mono','VHS',monospace;
  overflow-x:hidden;
  cursor:none;
}

#cursor{
  width:10px;height:10px;
  background:#e5e7eb;
  position:fixed;
  top:0;left:0;
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:difference;
  transform:translate(-50%,-50%);
}

#cursor-trail{
  width:30px;height:30px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:50%;
  position:fixed;
  top:0;left:0;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
  transition:left 0.12s ease,top 0.12s ease;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:24px 40px;
  border-bottom:1px solid #111827;
}

.logo{
  font-size:13px;
  letter-spacing:5px;
  color:#cbd5e1;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  font-size:12px;
  letter-spacing:2px;
  color:#4b5563;
  cursor:none;
}

.hero{
  padding:80px 40px;
}

.project{
  padding:40px;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 14px;
  border:1px solid #333;
  color:#e5e7eb;
  text-decoration:none;
}

/* resto igual */
</style>
</head>

<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>

<header>
  <div class="logo">WEIRD STUFF</div>
  <nav>
    <a href="#who">WHO ARE?</a>
    <a href="#projects">PROJECTS</a>
    <a href="#team">OUR TEAM</a>
    <a href="#contact">CONTACT</a>
  </nav>
</header>

<div class="hero">
  <h1 id="hero-text"></h1>
</div>

<section id="who">
  <p>Weird Stuff.</p>
</section>

<section id="projects">

  <div class="project">
    <h2>Monix</h2>
    <p class="sub">ALL IN ONE SYSTEM SUITE</p>

    <!-- FIX REAL PARA GITHUB PAGES -->
    <a class="btn" href="/Apps/Monix.web/">OPEN</a>

  </div>

</section>

<script>
const lines = ["We got bored","and we decided","to make these things."];
const el = document.getElementById('hero-text');
let li = 0, ci = 0, text = '';

function type(){
  if(li >= lines.length){
    el.innerHTML = text;
    return;
  }

  if(ci < lines[li].length){
    text += lines[li][ci++];
  } else {
    text += "\n";
    li++; ci = 0;
  }

  el.innerHTML = text.replace(/\n/g,'<br>');
  setTimeout(type, 40);
}

setTimeout(type, 400);
</script>

</body>
</html>
