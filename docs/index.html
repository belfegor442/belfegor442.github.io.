<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weird Stuff</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="icon" type="image/jpeg" href="/icon.jpg">

<style>
:root{
  --bg:#05070a;
  --text:#e5e7eb;
  --muted:#4b5563;
  --border:#111827;
}

@media (prefers-color-scheme: light){
  :root{
    --bg:#f5f5f5;
    --text:#111827;
    --muted:#4b5563;
    --border:#e5e7eb;
  }
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono',monospace;
  overflow-x:hidden;
  cursor:none;
}

/* CURSOR */
#cursor{
  width:10px;height:10px;
  background:var(--text);
  position:fixed;
  top:0;left:0;
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:difference;
  transform:translate(-50%,-50%);
}

#cursor-trail{
  width:30px;height:30px;
  border:1px solid var(--border);
  border-radius:50%;
  position:fixed;
  top:0;left:0;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
  transition:left .12s ease,top .12s ease;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:100% 4px;
  pointer-events:none;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:24px 40px;
  border-bottom:1px solid var(--border);
}

.logo{
  font-size:13px;
  letter-spacing:5px;
  color:var(--text);
}

nav a{
  margin-left:20px;
  text-decoration:none;
  font-size:12px;
  letter-spacing:2px;
  color:var(--muted);
}

nav a:hover{color:var(--text);}

/* HERO */
.hero{
  padding:120px 40px 60px;
  max-width:900px;
}

.hero h1{
  font-size:58px;
  font-weight:400;
  line-height:1.05;
}

.cursor-blink{
  display:inline-block;
  width:3px;
  height:0.85em;
  background:var(--text);
  animation:blink .8s step-end infinite;
}

@keyframes blink{50%{opacity:0;}}

.quote{
  margin-top:30px;
  text-align:right;
  color:var(--muted);
  font-size:12px;
}

/* SECTIONS */
section{padding:80px 40px;}

.label{
  font-size:10px;
  letter-spacing:4px;
  color:var(--muted);
  margin-bottom:24px;
}

/* WHO */
.who p{
  font-size:16px;
  color:var(--muted);
  line-height:2;
}

.who p:hover{color:var(--text);}

/* PROJECTS */
.project{
  margin-top:32px;
  max-width:680px;
  padding:28px;
  border:1px solid var(--border);
}

.project h2{
  font-size:40px;
}

.project .sub{
  color:var(--muted);
  font-size:12px;
}

.btn{
  display:inline-block;
  padding:8px 16px;
  border:1px solid var(--border);
  color:var(--muted);
  text-decoration:none;
  font-size:11px;
}

.btn:hover{color:var(--text);}

/* STATUS */
.status{
  margin-top:20px;
  font-size:10px;
  color:var(--muted);
}

/* TEAM */
.team-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1px;
  border:1px solid var(--border);
}

.member{
  padding:32px;
  background:var(--bg);
}

.member-name{
  font-size:28px;
  color:var(--text);
}

.member-bio{
  font-size:12px;
  color:var(--muted);
  margin-top:16px;
}

/* CONTACT */
.contact-link{
  display:flex;
  justify-content:space-between;
  padding:20px 0;
  border-bottom:1px solid var(--border);
  text-decoration:none;
  color:var(--muted);
}

.contact-link:hover{color:var(--text);}

/* FOOTER */
footer{
  padding:40px;
  border-top:1px solid var(--border);
  font-size:10px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>

<header>
  <div class="logo">WEIRD STUFF</div>
  <nav>
    <a href="#who">WHO</a>
    <a href="#projects">PROJECTS</a>
    <a href="#team">TEAM</a>
    <a href="#contact">CONTACT</a>
  </nav>
</header>

<div class="hero">
  <h1 id="hero-text"></h1>
  <div class="quote">— belfegor442</div>
</div>

<section id="who">
  <div class="label">// WHO</div>
  <div class="who">
    <p>We make software.</p>
    <p>Because we can.</p>
  </div>
</section>

<section id="projects">
  <div class="label">// PROJECTS</div>

  <div class="project">
    <h2>Monix</h2>
    <p class="sub">ALL IN ONE SYSTEM</p>
    <a class="btn" href="Apps/Monix.web/index.html">OPEN</a>
    <div class="status">ACTIVE</div>
  </div>

  <div class="project">
    <h2>Meat</h2>
    <p class="sub">WIP</p>
    <a class="btn" href="Apps/Meat/index.html">OPEN</a>
    <div class="status">WORK IN PROGRESS</div>
  </div>
</section>

<section id="team">
  <div class="label">// TEAM</div>

  <div class="team-grid">
    <div class="member">
      <div class="member-name">belfegor442</div>
      <div class="member-bio">CEO</div>
    </div>
  </div>
</section>

<section id="contact">
  <div class="label">// CONTACT</div>

  <a class="contact-link" href="mailto:test@gmail.com">
    EMAIL <span>→</span>
  </a>
</section>

<footer>
  <div>WEIRD STUFF</div>
  <span id="ts"></span>
</footer>

<script>
const cur = document.getElementById('cursor');
const trail = document.getElementById('cursor-trail');

document.addEventListener('mousemove', e=>{
  cur.style.left = e.clientX+'px';
  cur.style.top = e.clientY+'px';
});

setInterval(()=>{
  trail.style.left = cur.style.left;
  trail.style.top = cur.style.top;
},50);

function tick(){
  document.getElementById('ts').textContent =
    new Date().toLocaleTimeString('es-ES',{hour12:false});
}
setInterval(tick,1000);
tick();
</script>

</body>
</html>
